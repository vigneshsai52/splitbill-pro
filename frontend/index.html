<!DOCTYPE html>
<html>
<head>
    <title>SplitBill Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        button:hover { background: #5a6fd6; }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .hidden { display: none; }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .group-item, .expense-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .group-item:hover, .expense-item:hover {
            background: #f8f9fa;
        }

        .balance-positive { color: #2e7d32; font-weight: bold; }
        .balance-negative { color: #c33; font-weight: bold; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 SplitBill Pro</h1>
            <p>Split expenses with friends. Track who owes whom.</p>
        </header>

        <!-- Auth Section -->
        <div id="authSection" class="card">
            <div class="tabs">
                <div class="tab active" onclick="showTab('login')">Login</div>
                <div class="tab" onclick="showTab('register')">Register</div>
            </div>

            <div id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••">
                </div>
                <button onclick="login()">Login</button>
            </div>

            <div id="registerForm" class="hidden">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="regName" placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="••••••">
                </div>
                <button onclick="register()">Register</button>
            </div>

            <div id="authMessage"></div>
        </div>

        <!-- Main App (hidden until logged in) -->
        <div id="appSection" class="hidden">
            <!-- Create Group -->
            <div class="card">
                <h3>➕ Create New Group</h3>
                <div class="form-group">
                    <label>Group Name</label>
                    <input type="text" id="groupName" placeholder="Trip to Goa">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="groupDesc" placeholder="Weekend trip expenses">
                </div>
                <button onclick="createGroup()">Create Group</button>
            </div>

            <!-- My Groups -->
            <div class="card">
                <h3>👥 My Groups</h3>
                <div id="groupsList"></div>
            </div>

            <!-- Selected Group -->
            <div id="groupDetails" class="card hidden">
                <h3 id="selectedGroupName"></h3>

                <!-- Add Expense -->
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="expenseDesc" placeholder="Dinner at Restaurant">
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="expenseAmount" placeholder="1000">
                </div>
                <div class="form-group">
                    <label>Paid By</label>
                    <select id="paidBy"></select>
                </div>
                <button onclick="addExpense()">Add Expense</button>

                <!-- Expenses List -->
                <h4 style="margin-top: 20px;">📋 Expenses</h4>
                <div id="expensesList"></div>

                <!-- Balances -->
                <h4 style="margin-top: 20px;">💰 Balances</h4>
                <div id="balancesList"></div>
            </div>
        </div>
    </div>

    <script>
const API_URL = 'https://splitbill-pro-1.onrender.com';
        let token = localStorage.getItem('token');
        let currentGroup = null;
        let currentUser = null;

        // Check if already logged in
        if (token) {
            showApp();
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => {
                if (t.textContent.toLowerCase() === tab) t.classList.add('active');
            });

            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        }

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email, password})
                });

                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    data = null;
                }

                if (response.ok) {
                    showMessage('authMessage', 'Registration successful! Please login.', 'success');
                    showTab('login');
                } else {
                    let errorMsg = 'Registration failed';
                    if (data && Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(e => e.msg || JSON.stringify(e)).join(', ');
                    } else if (data && typeof data.detail === 'string') {
                        errorMsg = data.detail;
                    } else if (data && data.detail) {
                        errorMsg = JSON.stringify(data.detail);
                    } else if (data && data.message) {
                        errorMsg = data.message;
                    } else if (!data) {
                        errorMsg = `Server error (${response.status})`;
                    }
                    showMessage('authMessage', errorMsg, 'error');
                }
            } catch (err) {
                showMessage('authMessage', 'Network error - check your connection', 'error');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
                });

                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    data = null;
                }

                if (response.ok && data) {
                    token = data.access_token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    showApp();
                } else {
                    let errorMsg = 'Login failed';
                    if (data && Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(e => e.msg || JSON.stringify(e)).join(', ');
                    } else if (data && typeof data.detail === 'string') {
                        errorMsg = data.detail;
                    } else if (data && data.detail) {
                        errorMsg = JSON.stringify(data.detail);
                    } else if (data && data.message) {
                        errorMsg = data.message;
                    } else if (!data) {
                        errorMsg = `Server error (${response.status})`;
                    }
                    showMessage('authMessage', errorMsg, 'error');
                }
            } catch (err) {
                showMessage('authMessage', 'Network error - check your connection', 'error');
            }
        }

        function showApp() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            loadGroups();
        }

        function showMessage(id, text, type) {
            const el = document.getElementById(id);
            if (typeof text !== 'string') {
                try { text = JSON.stringify(text); } catch(e) { text = String(text); }
            }
            el.textContent = text;
            el.className = type;
            setTimeout(() => { el.textContent = ''; el.className = ''; }, 3000);
        }

        async function createGroup() {
            const name = document.getElementById('groupName').value;
            const description = document.getElementById('groupDesc').value;

            try {
                const response = await fetch(`${API_URL}/groups/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({name, description, member_emails: []})
                });

                if (response.ok) {
                    document.getElementById('groupName').value = '';
                    document.getElementById('groupDesc').value = '';
                    loadGroups();
                } else {
                    let data;
                    try { data = await response.json(); } catch(e) { data = null; }
                    console.error('Create group failed:', data || response.status);
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function loadGroups() {
            try {
                const response = await fetch(`${API_URL}/groups/`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });

                const groups = await response.json();
                const html = groups.map(g => `
                    <div class="group-item" onclick="selectGroup(${g.id}, '${g.name.replace(/'/g, "\'")}')">
                        <strong>${g.name}</strong>
                        <p style="color: #666; font-size: 0.9rem;">${g.description || 'No description'}</p>
                    </div>
                `).join('');

                document.getElementById('groupsList').innerHTML = html || '<p>No groups yet</p>';
            } catch (err) {
                console.error(err);
            }
        }

        async function selectGroup(groupId, groupName) {
            currentGroup = groupId;
            document.getElementById('groupDetails').classList.remove('hidden');
            document.getElementById('selectedGroupName').textContent = groupName;

            // Load members for dropdown
            const response = await fetch(`${API_URL}/groups/`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const groups = await response.json();
            const group = groups.find(g => g.id === groupId);

            if (group && group.members) {
                const options = group.members.map(m => 
                    `<option value="${m.id}">${m.name}</option>`
                ).join('');
                document.getElementById('paidBy').innerHTML = options;
            }

            loadExpenses();
            loadBalances();
        }

        async function addExpense() {
            const description = document.getElementById('expenseDesc').value;
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            const paidById = parseInt(document.getElementById('paidBy').value);

            const splits = [{
                user_id: paidById,
                amount_owed: amount
            }];

            try {
                const response = await fetch(`${API_URL}/expenses/?group_id=${currentGroup}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        description,
                        amount,
                        paid_by_id: paidById,
                        splits
                    })
                });

                if (response.ok) {
                    document.getElementById('expenseDesc').value = '';
                    document.getElementById('expenseAmount').value = '';
                    loadExpenses();
                    loadBalances();
                } else {
                    let data;
                    try { data = await response.json(); } catch(e) { data = null; }
                    console.error('Add expense failed:', data || response.status);
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function loadExpenses() {
            try {
                const response = await fetch(`${API_URL}/expenses/group/${currentGroup}`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });

                const expenses = await response.json();
                const html = expenses.map(e => `
                    <div class="expense-item">
                        <strong>${e.description}</strong>
                        <span style="float: right; color: #667eea; font-weight: bold;">₹${e.amount}</span>
                        <p style="color: #666; font-size: 0.85rem;">Paid by ${e.paid_by?.name || 'Unknown'}</p>
                    </div>
                `).join('');

                document.getElementById('expensesList').innerHTML = html || '<p>No expenses yet</p>';
            } catch (err) {
                console.error(err);
            }
        }

        async function loadBalances() {
            try {
                const response = await fetch(`${API_URL}/expenses/balances/${currentGroup}`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });

                const balances = await response.json();
                const html = Object.entries(balances).map(([userId, data]) => {
                    const amount = data.amount;
                    const className = amount > 0 ? 'balance-positive' : amount < 0 ? 'balance-negative' : '';
                    const text = amount > 0 ? `owes you ₹${amount}` : amount < 0 ? `you owe ₹${Math.abs(amount)}` : 'settled up';
                    return `<div style="padding: 10px; border-bottom: 1px solid #eee;">
                        <strong>${data.name}</strong>: 
                        <span class="${className}">${text}</span>
                    </div>`;
                }).join('');

                document.getElementById('balancesList').innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
