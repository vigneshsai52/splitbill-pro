<!DOCTYPE html>
<html>
<head>
    <title>SplitBill Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        button:hover { background: #5a6fd6; }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .hidden { display: none; }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .group-item {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafafa;
        }

        .group-item:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .group-item:hover p {
            color: rgba(255,255,255,0.8) !important;
        }

        .group-item strong {
            font-size: 1.1rem;
            display: block;
            margin-bottom: 5px;
        }

        .group-item p {
            color: #666;
            font-size: 0.9rem;
        }

        .expense-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .balance-positive { color: #2e7d32; font-weight: bold; }
        .balance-negative { color: #c33; font-weight: bold; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .group-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .group-info h3 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .group-info p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin: 25px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn {
            background: #f0f0f0;
            color: #333;
            width: auto;
            padding: 8px 16px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .back-btn:hover {
            background: #e0e0e0;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-left: 10px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 SplitBill Pro</h1>
            <p>Split expenses with friends. Track who owes whom.</p>
        </header>

        <!-- Auth Section -->
        <div id="authSection" class="card">
            <div class="tabs">
                <div class="tab active" data-tab="login">Login</div>
                <div class="tab" data-tab="register">Register</div>
            </div>

            <div id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••">
                </div>
                <button onclick="login()">Login</button>
            </div>

            <div id="registerForm" class="hidden">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="regName" placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="••••••">
                </div>
                <button onclick="register()">Register</button>
            </div>

            <div id="authMessage"></div>
        </div>

        <!-- Main App (hidden until logged in) -->
        <div id="appSection" class="hidden">
            <!-- Create Group -->
            <div class="card">
                <h3>➕ Create New Group</h3>
                <div class="form-group">
                    <label>Group Name</label>
                    <input type="text" id="groupName" placeholder="Trip to Goa">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="groupDesc" placeholder="Weekend trip expenses">
                </div>
                <button onclick="createGroup()">Create Group</button>
            </div>

            <!-- My Groups -->
            <div class="card">
                <h3>👥 My Groups</h3>
                <div id="groupsList">
                    <div class="empty-state">Loading groups...</div>
                </div>
            </div>

            <!-- Selected Group -->
            <div id="groupDetails" class="card hidden">
                <button class="back-btn" onclick="closeGroupDetails()">← Back to Groups</button>

                <!-- Group Info Display -->
                <div class="group-info">
                    <h3 id="selectedGroupName"></h3>
                    <p id="selectedGroupDesc"></p>
                </div>

                <!-- Add Expense -->
                <div class="section-title">➕ Add New Expense</div>
                <div class="form-group">
                    <label>Expense Description</label>
                    <input type="text" id="expenseDesc" placeholder="Dinner at Restaurant">
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="expenseAmount" placeholder="1000">
                </div>
                <div class="form-group">
                    <label>Paid By</label>
                    <select id="paidBy"></select>
                </div>
                <button onclick="addExpense()">Add Expense</button>

                <!-- Expenses List -->
                <div class="section-title">📋 Expenses</div>
                <div id="expensesList"></div>

                <!-- Balances -->
                <div class="section-title">💰 Balances</div>
                <div id="balancesList"></div>
            </div>
        </div>
    </div>

    <script>
const API_URL = 'https://splitbill-pro-1.onrender.com';
        let token = localStorage.getItem('token');
        let currentGroup = null;
        let currentUser = null;

        // Check if already logged in
        if (token) {
            showApp();
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabName = this.getAttribute('data-tab');
                showTab(tabName);
            });
        });

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');

            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        }

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email, password})
                });

                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    data = null;
                }

                if (response.ok) {
                    showMessage('authMessage', 'Registration successful! Please login.', 'success');
                    showTab('login');
                } else {
                    let errorMsg = 'Registration failed';
                    if (data && Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(e => e.msg || JSON.stringify(e)).join(', ');
                    } else if (data && typeof data.detail === 'string') {
                        errorMsg = data.detail;
                    } else if (data && data.detail) {
                        errorMsg = JSON.stringify(data.detail);
                    } else if (data && data.message) {
                        errorMsg = data.message;
                    } else if (!data) {
                        errorMsg = `Server error (${response.status})`;
                    }
                    showMessage('authMessage', errorMsg, 'error');
                }
            } catch (err) {
                showMessage('authMessage', 'Network error - check your connection', 'error');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
                });

                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    data = null;
                }

                if (response.ok && data) {
                    token = data.access_token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    showApp();
                } else {
                    let errorMsg = 'Login failed';
                    if (data && Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(e => e.msg || JSON.stringify(e)).join(', ');
                    } else if (data && typeof data.detail === 'string') {
                        errorMsg = data.detail;
                    } else if (data && data.detail) {
                        errorMsg = JSON.stringify(data.detail);
                    } else if (data && data.message) {
                        errorMsg = data.message;
                    } else if (!data) {
                        errorMsg = `Server error (${response.status})`;
                    }
                    showMessage('authMessage', errorMsg, 'error');
                }
            } catch (err) {
                showMessage('authMessage', 'Network error - check your connection', 'error');
            }
        }

        function showApp() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            loadGroups();
        }

        function showMessage(id, text, type) {
            const el = document.getElementById(id);
            if (typeof text !== 'string') {
                try { text = JSON.stringify(text); } catch(e) { text = String(text); }
            }
            el.textContent = text;
            el.className = type;
            setTimeout(() => { el.textContent = ''; el.className = ''; }, 3000);
        }

        async function createGroup() {
            const name = document.getElementById('groupName').value.trim();
            const description = document.getElementById('groupDesc').value.trim();

            if (!name) {
                alert('Please enter a group name');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/groups/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({name, description, member_emails: []})
                });

                if (response.ok) {
                    document.getElementById('groupName').value = '';
                    document.getElementById('groupDesc').value = '';
                    loadGroups();
                } else {
                    let data;
                    try { data = await response.json(); } catch(e) { data = null; }
                    alert('Create group failed: ' + (data?.detail || response.status));
                }
            } catch (err) {
                alert('Network error creating group');
            }
        }

        async function loadGroups() {
            const container = document.getElementById('groupsList');
            container.innerHTML = '<div class="empty-state">Loading groups...</div>';

            try {
                const response = await fetch(`${API_URL}/groups/`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });

                const groups = await response.json();

                if (!groups || groups.length === 0) {
                    container.innerHTML = '<div class="empty-state">No groups yet. Create one above!</div>';
                    return;
                }

                container.innerHTML = '';
                groups.forEach(g => {
                    const div = document.createElement('div');
                    div.className = 'group-item';
                    div.innerHTML = `
                        <strong>${escapeHtml(g.name)}</strong>
                        <p>${escapeHtml(g.description || 'No description')}</p>
                    `;
                    div.addEventListener('click', () => selectGroup(g.id, g.name, g.description));
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = '<div class="empty-state">Error loading groups</div>';
                console.error(err);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeGroupDetails() {
            document.getElementById('groupDetails').classList.add('hidden');
        }

        async function selectGroup(groupId, groupName, groupDesc) {
            currentGroup = groupId;
            document.getElementById('groupDetails').classList.remove('hidden');
            document.getElementById('selectedGroupName').textContent = groupName || 'Unnamed Group';
            document.getElementById('selectedGroupDesc').textContent = groupDesc || 'No description';

            // Load members for dropdown
            try {
                const response = await fetch(`${API_URL}/groups/`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const groups = await response.json();
                const group = groups.find(g => g.id === groupId);

                const select = document.getElementById('paidBy');
                select.innerHTML = '';

                if (group && group.members && group.members.length > 0) {
                    group.members.forEach(m => {
                        const option = document.createElement('option');
                        option.value = m.id;
                        option.textContent = m.name;
                        select.appendChild(option);
                    });
                } else {
                    const option = document.createElement('option');
                    option.value = currentUser?.id || '';
                    option.textContent = currentUser?.name || 'You';
                    select.appendChild(option);
                }
            } catch (err) {
                console.error(err);
            }

            loadExpenses();
            loadBalances();
        }

        async function addExpense() {
            const description = document.getElementById('expenseDesc').value.trim();
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            const paidById = parseInt(document.getElementById('paidBy').value);

            if (!description || !amount) {
                alert('Please enter description and amount');
                return;
            }

            const splits = [{
                user_id: paidById,
                amount_owed: amount
            }];

            try {
                const response = await fetch(`${API_URL}/expenses/?group_id=${currentGroup}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        description,
                        amount,
                        paid_by_id: paidById,
                        splits
                    })
                });

                if (response.ok) {
                    document.getElementById('expenseDesc').value = '';
                    document.getElementById('expenseAmount').value = '';
                    loadExpenses();
                    loadBalances();
                } else {
                    let data;
                    try { data = await response.json(); } catch(e) { data = null; }
                    alert('Add expense failed: ' + (data?.detail || response.status));
                }
            } catch (err) {
                alert('Network error adding expense');
            }
        }

        async function loadExpenses() {
            const container = document.getElementById('expensesList');

            try {
                const response = await fetch(`${API_URL}/expenses/group/${currentGroup}`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });

                const expenses = await response.json();

                if (!expenses || expenses.length === 0) {
                    container.innerHTML = '<div class="empty-state">No expenses yet</div>';
                    return;
                }

                container.innerHTML = '';
                expenses.forEach(e => {
                    const div = document.createElement('div');
                    div.className = 'expense-item';
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong>${escapeHtml(e.description)}</strong>
                                <p style="color: #666; font-size: 0.85rem; margin-top: 4px;">
                                    Paid by ${escapeHtml(e.paid_by?.name || 'Unknown')}
                                </p>
                            </div>
                            <span style="color: #667eea; font-weight: bold; font-size: 1.1rem;">
                                ₹${e.amount}
                            </span>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = '<div class="empty-state">Error loading expenses</div>';
                console.error(err);
            }
        }

        async function loadBalances() {
            const container = document.getElementById('balancesList');

            try {
                const response = await fetch(`${API_URL}/expenses/balances/${currentGroup}`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });

                const balances = await response.json();
                const entries = Object.entries(balances);

                if (entries.length === 0) {
                    container.innerHTML = '<div class="empty-state">No balances yet</div>';
                    return;
                }

                container.innerHTML = '';
                entries.forEach(([userId, data]) => {
                    const amount = data.amount;
                    const className = amount > 0 ? 'balance-positive' : amount < 0 ? 'balance-negative' : '';
                    let text;
                    if (amount > 0) text = `owes you ₹${amount}`;
                    else if (amount < 0) text = `you owe ₹${Math.abs(amount)}`;
                    else text = 'settled up';

                    const div = document.createElement('div');
                    div.style.cssText = 'padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;';
                    div.innerHTML = `
                        <strong>${escapeHtml(data.name)}</strong>
                        <span class="${className}">${text}</span>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = '<div class="empty-state">Error loading balances</div>';
                console.error(err);
            }
        }
    </script>
</body>
</html>
