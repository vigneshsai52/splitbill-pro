<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitBill Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .auth-section {
            padding: 40px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab:hover {
            color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input::placeholder {
            color: #aaa;
            font-style: italic;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .btn-danger:hover {
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
        }

        .btn-small {
            width: auto;
            padding: 8px 16px;
            font-size: 14px;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .app-section {
            padding: 40px;
            display: none;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .app-header h2 {
            color: #333;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-name {
            font-weight: 600;
            color: #667eea;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.3em;
        }

        .card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-title {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .card-desc {
            color: #666;
            font-size: 0.9em;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .group-item {
            cursor: pointer;
            position: relative;
        }

        .group-item:hover {
            background: #e3f2fd;
            border-color: #2196f3;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #e0e0e0;
        }

        .expense-info h4 {
            color: #333;
            margin-bottom: 5px;
        }

        .expense-info p {
            color: #666;
            font-size: 0.9em;
        }

        .expense-amount {
            font-weight: 700;
            color: #667eea;
            font-size: 1.2em;
        }

        .balance-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .balance-positive {
            color: #27ae60;
            font-weight: 600;
        }

        .balance-negative {
            color: #e74c3c;
            font-weight: 600;
        }

        .hidden {
            display: none !important;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .modal p {
            margin-bottom: 20px;
            color: #666;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .back-btn {
            background: #6c757d;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: #5a6268;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .app-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SplitBill Pro</h1>
            <p>Split expenses with friends, hassle-free</p>
        </div>

        <!-- Auth Section -->
        <div id="authSection" class="auth-section">
            <div class="tabs">
                <button class="tab active" onclick="showTab('login')">Login</button>
                <button class="tab" onclick="showTab('register')">Register</button>
            </div>

            <div id="authMessage" class="message"></div>

            <div id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="e.g., yourname@gmail.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <button class="btn" onclick="login()">Login</button>
            </div>

            <div id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="regName" placeholder="e.g., Vignesh">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="e.g., yourname@gmail.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Min 6 characters">
                </div>
                <button class="btn" onclick="register()">Register</button>
            </div>
        </div>

        <!-- App Section -->
        <div id="appSection" class="app-section">
            <div class="app-header">
                <h2>My Dashboard</h2>
                <div class="user-info">
                    <span class="user-name" id="userName"></span>
                    <button class="btn btn-small btn-danger" onclick="logout()">Logout</button>
                </div>
            </div>

            <!-- Groups List -->
            <div id="groupsList">
                <div class="section">
                    <h3>Create New Group</h3>
                    <div class="card">
                        <div class="form-group">
                            <label>Group Name</label>
                            <input type="text" id="groupName" placeholder="e.g., Trip to Goa">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <input type="text" id="groupDesc" placeholder="e.g., Weekend trip expenses">
                        </div>
                        <button class="btn" onclick="createGroup()">Create Group</button>
                    </div>
                </div>

                <div class="section">
                    <h3>My Groups</h3>
                    <div id="groupsContainer"></div>
                </div>
            </div>

            <!-- Group Details -->
            <div id="groupDetails" style="display: none;">
                <button class="btn btn-small back-btn" onclick="showGroupsList()">← Back to Groups</button>
                
                <div class="section">
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="card-title" id="detailGroupName">Group Name</div>
                                <div class="card-desc" id="detailGroupDesc">Description</div>
                            </div>
                            <button class="delete-btn" onclick="deleteCurrentGroup()">Delete Group</button>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <h3>Add New Expense</h3>
                    <div class="card">
                        <div class="form-group">
                            <label>Description</label>
                            <input type="text" id="expenseDesc" placeholder="e.g., Dinner at Restaurant">
                        </div>
                        <div class="grid">
                            <div class="form-group">
                                <label>Amount (₹)</label>
                                <input type="number" id="expenseAmount" placeholder="e.g., 1000">
                            </div>
                            <div class="form-group">
                                <label>Paid By</label>
                                <select id="paidBy"></select>
                            </div>
                        </div>
                        <button class="btn" onclick="addExpense()">Add Expense</button>
                    </div>
                </div>

                <div class="section">
                    <h3>Expenses</h3>
                    <div id="expensesList"></div>
                </div>

                <div class="section">
                    <h3>Balances</h3>
                    <div id="balancesList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal">
            <h3>Delete Group?</h3>
            <p>Are you sure you want to delete this group? All expenses will be removed. This cannot be undone.</p>
            <div class="modal-buttons">
                <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
                <button class="btn back-btn" onclick="cancelDelete()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://splitbill-pro-1.onrender.com';
        let token = localStorage.getItem('token');
        let currentUser = null;
        let currentGroupId = null;
        let deleteGroupId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            if (token) {
                validateToken();
            }
        });

        async function validateToken() {
            try {
                const response = await fetch(`${API_URL}/groups/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const userResp = await fetch(`${API_URL}/auth/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (userResp.ok) {
                        currentUser = await userResp.json();
                        showApp();
                    } else {
                        logout();
                    }
                } else if (response.status === 401) {
                    logout();
                } else {
                    logout();
                }
            } catch (err) {
                showMessage('authMessage', 'Cannot connect to server. Please try again later.', 'error');
                logout();
            }
        }

        function showTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
            hideMessage('authMessage');
        }

        function showMessage(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'message ' + type;
        }

        function hideMessage(id) {
            const el = document.getElementById(id);
            el.className = 'message';
            el.style.display = 'none';
        }

        async function register() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!name || !email || !password) {
                showMessage('authMessage', 'Please fill in all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    data = null;
                }

                if (response.ok) {
                    showMessage('authMessage', 'Registration successful! Please login.', 'success');
                    showTab('login');
                } else {
                    let errorMsg = 'Registration failed';
                    if (data && Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(e => e.msg || JSON.stringify(e)).join(', ');
                    } else if (data && typeof data.detail === 'string') {
                        errorMsg = data.detail;
                    } else if (data && data.detail) {
                        errorMsg = JSON.stringify(data.detail);
                    } else if (data && data.message) {
                        errorMsg = data.message;
                    } else if (!data) {
                        errorMsg = `Server error (${response.status})`;
                    }
                    showMessage('authMessage', errorMsg, 'error');
                }
            } catch (err) {
                showMessage('authMessage', 'Network error - check your connection', 'error');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('authMessage', 'Please fill in all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
                });

                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    data = null;
                }

                if (response.ok && data) {
                    token = data.access_token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    showApp();
                } else {
                    let errorMsg = 'Login failed';
                    if (data && Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(e => e.msg || JSON.stringify(e)).join(', ');
                    } else if (data && typeof data.detail === 'string') {
                        errorMsg = data.detail;
                    } else if (data && data.detail) {
                        errorMsg = JSON.stringify(data.detail);
                    } else if (data && data.message) {
                        errorMsg = data.message;
                    } else if (!data) {
                        errorMsg = `Server error (${response.status})`;
                    }
                    showMessage('authMessage', errorMsg, 'error');
                }
            } catch (err) {
                showMessage('authMessage', 'Network error - check your connection', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            currentUser = null;
            currentGroupId = null;
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('appSection').style.display = 'none';
            document.getElementById('groupsList').style.display = 'block';
            document.getElementById('groupDetails').style.display = 'none';
            hideMessage('authMessage');
        }

        function showApp() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('userName').textContent = currentUser ? currentUser.name : 'User';
            loadGroups();
        }

        function showGroupsList() {
            document.getElementById('groupsList').style.display = 'block';
            document.getElementById('groupDetails').style.display = 'none';
            currentGroupId = null;
            loadGroups();
        }

        async function loadGroups() {
            const container = document.getElementById('groupsContainer');
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#666;">Loading groups...</div>';

            try {
                const response = await fetch(`${API_URL}/groups/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    logout();
                    showMessage('authMessage', 'Session expired. Please login again.', 'error');
                    return;
                }

                if (!response.ok) {
                    container.innerHTML = '<div style="text-align:center;padding:20px;color:#e74c3c;">Error loading groups. Please try again.</div>';
                    return;
                }

                const groups = await response.json();
                
                if (groups.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:20px;color:#666;">No groups yet. Create one above!</div>';
                    return;
                }

                container.innerHTML = '';
                groups.forEach(group => {
                    const div = document.createElement('div');
                    div.className = 'card group-item';
                    
                    const name = (group.name || 'Unnamed Group').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const desc = (group.description || 'No description').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    
                    div.innerHTML = `
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div>
                                <div class="card-title">${name}</div>
                                <div class="card-desc">${desc}</div>
                            </div>
                            <button class="delete-btn" data-group-id="${group.id}">Delete</button>
                        </div>
                    `;
                    
                    div.addEventListener('click', function(e) {
                        if (e.target.classList.contains('delete-btn')) {
                            e.stopPropagation();
                            openDeleteModal(group.id);
                        } else {
                            selectGroup(group.id, group.name, group.description);
                        }
                    });
                    
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = '<div style="text-align:center;padding:20px;color:#e74c3c;">Error loading groups. Please refresh.</div>';
            }
        }

        async function createGroup() {
            const name = document.getElementById('groupName').value.trim();
            const description = document.getElementById('groupDesc').value.trim();

            if (!name) {
                alert('Please enter a group name');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/groups/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, description, member_emails: [] })
                });

                if (response.status === 401) {
                    logout();
                    showMessage('authMessage', 'Session expired. Please login again.', 'error');
                    return;
                }

                if (response.ok) {
                    document.getElementById('groupName').value = '';
                    document.getElementById('groupDesc').value = '';
                    loadGroups();
                } else {
                    let data;
                    try { data = await response.json(); } catch(e) { data = null; }
                    const msg = data && data.detail ? (Array.isArray(data.detail) ? data.detail.map(e=>e.msg).join(', ') : data.detail) : 'Failed to create group';
                    alert(msg);
                }
            } catch (err) {
                alert('Network error - please try again');
            }
        }

        function selectGroup(id, name, description) {
            currentGroupId = id;
            document.getElementById('groupsList').style.display = 'none';
            document.getElementById('groupDetails').style.display = 'block';
            document.getElementById('detailGroupName').textContent = name || 'Unnamed Group';
            document.getElementById('detailGroupDesc').textContent = description || 'No description';
            loadExpenses();
            loadBalances();
        }

        async function loadExpenses() {
            const list = document.getElementById('expensesList');
            list.innerHTML = '<div style="text-align:center;padding:20px;color:#666;">Loading expenses...</div>';

            try {
                const response = await fetch(`${API_URL}/expenses/group/${currentGroupId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                if (!response.ok) {
                    let data;
                    try { data = await response.json(); } catch(e) { data = null; }
                    console.error('Expenses load error:', response.status, data);
                    list.innerHTML = `<div style="text-align:center;padding:20px;color:#e74c3c;">Error loading expenses (${response.status})</div>`;
                    return;
                }

                const expenses = await response.json();
                
                const membersResponse = await fetch(`${API_URL}/groups/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                let members = [];
                if (membersResponse.ok) {
                    const groups = await membersResponse.json();
                    const group = groups.find(g => g.id === currentGroupId);
                    if (group && group.members) {
                        members = group.members;
                    }
                }
                
                const select = document.getElementById('paidBy');
                select.innerHTML = '';
                members.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = m.name || m.email;
                    select.appendChild(opt);
                });

                if (expenses.length === 0) {
                    list.innerHTML = '<div style="text-align:center;padding:20px;color:#666;">No expenses yet. Add one above!</div>';
                    return;
                }

                list.innerHTML = '';
                expenses.forEach(expense => {
                    const div = document.createElement('div');
                    div.className = 'expense-item';
                    const payer = expense.paid_by ? (expense.paid_by.name || expense.paid_by.email) : 'Unknown';
                    div.innerHTML = `
                        <div class="expense-info">
                            <h4>${expense.description || 'No description'}</h4>
                            <p>Paid by ${payer} on ${new Date(expense.created_at).toLocaleDateString()}</p>
                        </div>
                        <div class="expense-amount">₹${expense.amount}</div>
                    `;
                    list.appendChild(div);
                });
            } catch (err) {
                console.error('Expenses catch error:', err);
                list.innerHTML = '<div style="text-align:center;padding:20px;color:#e74c3c;">Error loading expenses</div>';
            }
        }

        async function addExpense() {
            const description = document.getElementById('expenseDesc').value.trim();
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            const paid_by_id = parseInt(document.getElementById('paidBy').value);

            if (!description || !amount || !paid_by_id) {
                alert('Please fill in all fields');
                return;
            }

            const payload = {
                description,
                amount,
                group_id: currentGroupId,
                paid_by_id,
                splits: []
            };
            
            console.log('Sending expense payload:', JSON.stringify(payload, null, 2));

            try {
                const response = await fetch(`${API_URL}/expenses/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                let data;
                try { data = await response.json(); } catch(e) { data = null; }
                
                console.log('Expense response:', response.status, data);

                if (response.status === 401) {
                    logout();
                    showMessage('authMessage', 'Session expired. Please login again.', 'error');
                    return;
                }

                if (response.ok) {
                    document.getElementById('expenseDesc').value = '';
                    document.getElementById('expenseAmount').value = '';
                    loadExpenses();
                    loadBalances();
                } else {
                    let errorMsg = 'Failed to add expense';
                    if (data && Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(e => {
                            const field = e.loc && e.loc.length > 0 ? e.loc[e.loc.length - 1] : 'field';
                            return `${field}: ${e.msg}`;
                        }).join('\n');
                    } else if (data && data.detail) {
                        errorMsg = JSON.stringify(data.detail);
                    } else if (data && data.message) {
                        errorMsg = data.message;
                    }
                    alert(errorMsg);
                }
            } catch (err) {
                console.error('Add expense network error:', err);
                alert('Network error - please try again');
            }
        }

        async function loadBalances() {
            const list = document.getElementById('balancesList');
            list.innerHTML = '<div style="text-align:center;padding:20px;color:#666;">Loading balances...</div>';

            try {
                const response = await fetch(`${API_URL}/expenses/balances/${currentGroupId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                if (!response.ok) {
                    let data;
                    try { data = await response.json(); } catch(e) { data = null; }
                    console.error('Balances error:', response.status, data);
                    list.innerHTML = `<div style="text-align:center;padding:20px;color:#e74c3c;">Error loading balances (${response.status})</div>`;
                    return;
                }

                const balances = await response.json();
                console.log('Balances data:', balances);
                
                if (!balances || Object.keys(balances).length === 0) {
                    list.innerHTML = '<div style="text-align:center;padding:20px;color:#666;">All settled up!</div>';
                    return;
                }

                list.innerHTML = '';
                for (const [user, amount] of Object.entries(balances)) {
                    const div = document.createElement('div');
                    div.className = 'balance-item';
                    const isPositive = amount >= 0;
                    div.innerHTML = `
                        <span>${user}</span>
                        <span class="${isPositive ? 'balance-positive' : 'balance-negative'}">
                            ${isPositive ? '+' : ''}₹${amount.toFixed(2)}
                        </span>
                    `;
                    list.appendChild(div);
                }
            } catch (err) {
                console.error('Balances catch error:', err);
                list.innerHTML = '<div style="text-align:center;padding:20px;color:#e74c3c;">Error loading balances</div>';
            }
        }

        function openDeleteModal(groupId) {
            deleteGroupId = groupId;
            document.getElementById('deleteModal').classList.add('show');
        }

        function cancelDelete() {
            deleteGroupId = null;
            document.getElementById('deleteModal').classList.remove('show');
        }

        function deleteCurrentGroup() {
            if (currentGroupId) {
                openDeleteModal(currentGroupId);
            }
        }

        async function confirmDelete() {
            if (!deleteGroupId) return;
            
            try {
                const response = await fetch(`${API_URL}/groups/${deleteGroupId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    cancelDelete();
                    logout();
                    showMessage('authMessage', 'Session expired. Please login again.', 'error');
                    return;
                }

                if (response.ok) {
                    cancelDelete();
                    if (currentGroupId === deleteGroupId) {
                        showGroupsList();
                    } else {
                        loadGroups();
                    }
                } else {
                    let data;
                    try { data = await response.json(); } catch(e) { data = null; }
                    alert(data && data.detail ? data.detail : 'Failed to delete group');
                    cancelDelete();
                }
            } catch (err) {
                alert('Network error - please try again');
                cancelDelete();
            }
        }
    </script>
</body>
</html>
